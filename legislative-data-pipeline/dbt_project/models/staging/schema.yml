version: 2

models:
  - name: stg_votes
    description: >
      Cleaned individual vote records from dipMex. Each row represents one
      legislator's vote on one vote event. Deduplicated on business key
      (legislature + vote_id + legislator_name).
    columns:
      - name: vote_sk
        description: "Surrogate key: MD5 hash of business key"
        tests:
          - unique
          - not_null
      - name: legislature
        tests:
          - not_null
      - name: vote_id
        tests:
          - not_null
      - name: legislator_name
        tests:
          - not_null
      - name: vote_cast
        description: "Standardized vote: FOR, AGAINST, ABSTAIN, ABSENT"
        tests:
          - not_null
          - accepted_values:
              values: ["FOR", "AGAINST", "ABSTAIN", "ABSENT"]

  - name: stg_deputies
    description: >
      Cleaned legislator profiles from dipMex. One row per legislator per
      legislature. Used to build dim_legislator.
    columns:
      - name: deputy_sk
        tests:
          - unique
          - not_null
      - name: legislator_id
        tests:
          - not_null
      - name: full_name
        tests:
          - not_null

  - name: stg_vote_summaries
    description: >
      Aggregate vote outcomes scraped from diputados.gob.mx. One row per
      vote event with total counts.
    columns:
      - name: vote_summary_sk
        tests:
          - unique
          - not_null
      - name: approval_rate
        description: "Computed: votes_for / total_present. Between 0.0 and 1.0."

sources:
  - name: raw
    schema: raw
    tables:
      - name: raw_dipmex_votes
      - name: raw_dipmex_deputies
      - name: raw_diputados_votes
