name: quantitative-finance CI

on:
  push:
    branches: [main]
    paths:
      - '01_professional/quantitative_finance/**'
      - '.github/workflows/quantitative_finance-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - '01_professional/quantitative_finance/**'

permissions:
  contents: read

defaults:
  run:
    working-directory: 01_professional/quantitative_finance

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check src/ tests/

      - name: Ruff format check
        run: ruff format --check src/ tests/

      - name: Mypy type check
        run: mypy src/

  test:
    name: Tests (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/ -m "unit" -v --tb=short

      - name: Run integration tests
        run: pytest tests/ -m "integration" -v --tb=short

      - name: Coverage gate
        run: pytest tests/ --cov=src/quantitative_finance --cov-fail-under=75

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install security tools
        run: pip install bandit pip-audit

      - name: Bandit static analysis
        run: bandit -r src/ -ll

      - name: Audit dependencies
        run: |
          pip install -e ".[dev]"
          pip-audit --desc
