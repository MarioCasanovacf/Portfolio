name: legislative_mx
version: "0.1.0"
config-version: 2

profile: legislative_mx

model-paths: ["models"]
test-paths: ["tests"]
macro-paths: ["macros"]
analysis-paths: ["analysis"]
seed-paths: ["seeds"]
snapshot-paths: ["snapshots"]
docs-paths: ["docs"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

vars:
  # Legislatures to include in models.
  active_legislatures: [64, 65, 66]

seeds:
  legislative_mx:
    legislature_calendar:
      +column_types:
        legislature: int
        start_date: date
        end_date: date
    legislator_bridge_overrides:
      +column_types:
        legislature: int
        legislator_name: varchar
        legislator_id: varchar
        note: varchar
